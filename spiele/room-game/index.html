<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Room Game — Lukas' Spiele</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: Arial, sans-serif;
      color: white;
      padding: 24px 12px;
    }
    h1 {
      color: #e94560;
      font-size: 2rem;
      margin-bottom: 6px;
      letter-spacing: 2px;
      text-align: center;
    }
    .intro {
      color: #aaa;
      font-size: 0.95rem;
      margin-bottom: 20px;
      text-align: center;
      max-width: 700px;
      line-height: 1.4;
    }
    .terminal {
      background: #0d0d17;
      border: 2px solid #e94560;
      border-radius: 12px;
      width: 100%;
      max-width: 820px;
      height: 60vh;
      min-height: 340px;
      padding: 16px;
      overflow-y: auto;
      font-family: "Consolas", "Courier New", monospace;
      font-size: 0.95rem;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .inputrow {
      display: flex;
      width: 100%;
      max-width: 820px;
      margin-top: 10px;
      gap: 8px;
    }
    .inputrow input {
      flex: 1;
      background: #0d0d17;
      border: 2px solid #444;
      border-radius: 8px;
      color: #7CFC00;
      font-family: "Consolas", "Courier New", monospace;
      font-size: 1rem;
      padding: 10px 12px;
      outline: none;
    }
    .inputrow input:enabled { border-color: #e94560; }
    .inputrow button {
      background: #e94560;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 1rem;
      font-weight: bold;
      padding: 10px 18px;
      cursor: pointer;
    }
    .inputrow button:disabled { background: #444; cursor: default; }
    .echo { color: #7CFC00; }
    .sysmsg { color: #e94560; font-weight: bold; }
    #restart {
      display: none;
      margin-top: 14px;
      background: #e94560;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 1.05rem;
      font-weight: bold;
      padding: 12px 26px;
      cursor: pointer;
    }
    #restart:hover { background: #ff5c77; }
    .back {
      margin-top: 22px;
      color: #aaa;
      text-decoration: none;
      font-size: 0.95rem;
      border-bottom: 1px dotted #aaa;
    }
    .back:hover { color: #e94560; border-color: #e94560; }
  </style>
</head>
<body>
  <h1>🎅 Room Game</h1>
  <p class="intro">Lukas' erstes Python-Spiel — ein Textadventure! Kämpfe dich durch Räume voller verrückter Weihnachts-Monster, sammle Geschenke und Haustiere. Antworte unten im Eingabefeld, z.&nbsp;B. mit <b>attack</b>, <b>next room</b> oder <b>use item</b>.</p>
  <div class="terminal" id="term"></div>
  <div class="inputrow">
    <input id="field" type="text" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="Deine Eingabe…" disabled>
    <button id="send" disabled>OK</button>
  </div>
  <button id="restart">🔄 Nochmal spielen</button>
  <a class="back" href="/spiele/">← zurück zu Lukas' Spielen</a>

  <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt-stdlib.js"></script>
  <script>
    const term = document.getElementById('term');
    const field = document.getElementById('field');
    const send = document.getElementById('send');
    const restart = document.getElementById('restart');
    let inputResolve = null;

    function write(text, cls) {
      const span = document.createElement('span');
      if (cls) span.className = cls;
      span.textContent = text;
      term.appendChild(span);
      term.scrollTop = term.scrollHeight;
    }

    function inputFun(promptText) {
      write(promptText);
      return new Promise((resolve) => {
        inputResolve = resolve;
        field.disabled = false;
        send.disabled = false;
        field.focus();
      });
    }

    function submitInput() {
      if (!inputResolve) return;
      const val = field.value;
      write(val + "\n", 'echo');
      field.value = '';
      field.disabled = true;
      send.disabled = true;
      const r = inputResolve;
      inputResolve = null;
      r(val);
    }
    field.addEventListener('keydown', (e) => { if (e.key === 'Enter') submitInput(); });
    send.addEventListener('click', submitInput);

    function builtinRead(x) {
      if (Sk.builtinFiles === undefined || Sk.builtinFiles["files"][x] === undefined)
        throw "File not found: '" + x + "'";
      return Sk.builtinFiles["files"][x];
    }

    async function run() {
      restart.style.display = 'none';
      term.innerHTML = '';
      write("=== ROOM GAME ===\n", 'sysmsg');
      write("von Lukas van der Donk\n\n", 'sysmsg');
      try {
        const resp = await fetch('room_game.py');
        const src = await resp.text();
        // exit() gibt es im Browser-Python nicht — kleiner Ersatz davor:
        const code = "def exit():\n    raise SystemExit\n" + src;
        Sk.configure({
          output: (t) => write(t),
          read: builtinRead,
          inputfun: inputFun,
          inputfunTakesPrompt: true,
          __future__: Sk.python3,
          execLimit: null
        });
        await Sk.misceval.asyncToPromise(() =>
          Sk.importMainWithBody("<stdin>", false, code, true)
        );
        write("\n=== Spiel beendet ===\n", 'sysmsg');
      } catch (e) {
        const name = e && e.tp$name ? e.tp$name : '';
        if (name === 'SystemExit') {
          write("\n=== GAME OVER ===\n", 'sysmsg');
        } else {
          write("\n[Fehler] " + e.toString() + "\n", 'sysmsg');
        }
      }
      field.disabled = true;
      send.disabled = true;
      inputResolve = null;
      restart.style.display = 'inline-block';
    }

    restart.addEventListener('click', run);
    run();
  </script>
</body>
</html>
