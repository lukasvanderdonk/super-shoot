<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strandspiel</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background-color: #1a1a2e;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        font-family: Arial, sans-serif;
        color: white;
        padding: 16px;
      }
      h1 { color: #e94560; margin-bottom: 8px; font-size: 1.6rem; }
      #hud {
        display: flex;
        gap: 24px;
        margin-bottom: 8px;
        font-size: 1rem;
      }
      #hud span b { color: #e94560; }
      canvas {
        background: #FFD500;
        display: block;
        max-width: 95vw;
        height: auto;
        border: 3px solid #e94560;
        border-radius: 4px;
      }
      #info { margin-top: 8px; font-size: 0.85rem; color: #aaa; }
      .back-link { margin-top: 10px; color: #aaa; font-size: 0.85rem; text-decoration: none; }
      .back-link:hover { color: #e94560; }
    </style>
  </head>
  <body>
    <h1>🏖️ Strandspiel</h1>
    <div id="hud">
      <span id="anzeige">Muscheln: <b>0</b></span>
      <span id="laufanzeige">Strecke: <b>0</b></span>
      <span id="rekord">Rekord: <b>0</b></span>
    </div>
    <canvas id="spielfeld" width="1000" height="750"></canvas>
    <div id="info">A / D oder Pfeiltasten zum Laufen — sammle Muscheln 🐚, weiche Steinen aus! Die Wellen spülen Muscheln weg. Auf dem Handy: linke / rechte Bildhälfte antippen und halten.</div>
    <a class="back-link" href="/spiele/">← Alle Spiele</a>
  <script>
const canvas = document.getElementById('spielfeld');
const ctx = canvas.getContext('2d');
const keys = {};
document.addEventListener('keydown', e => keys[e.code] = true);
document.addEventListener('keyup',   e => keys[e.code] = false);

// touch-steuerung: linke hälfte = links laufen, rechte hälfte = rechts laufen
let touchRichtung = 0;
canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    touchRichtung = (e.touches[0].clientX - rect.left < rect.width / 2) ? -1 : 1;
});
canvas.addEventListener('touchend', e => { e.preventDefault(); touchRichtung = 0; });

// jede welle hat: x, ziel, counter, countermax, reinspeed, rausspeed, y, höhe
let wellen, spielerx, körner, muscheln, steine, streke, score, läuft, speedBonus;
let zufalzahl, zufall, zufall_1_50;
let rekord = Number(localStorage.getItem('strand-rekord') || 0);
document.querySelector('#rekord b').textContent = rekord;

function neustart() {
    wellen = [
        { x: 0, ziel: Math.floor(Math.random() * 601) + 200, counter: 0, countermax: 110, reinspeed: 3,  rausspeed: 6,  y: 480, hoehe: 1000 },
        { x: 0, ziel: Math.floor(Math.random() * 601) + 200, counter: 40, countermax: 160, reinspeed: 2, rausspeed: 4,  y: 0,   hoehe: 1000 },
        { x: 0, ziel: Math.floor(Math.random() * 601) + 200, counter: 80, countermax: 90,  reinspeed: 5, rausspeed: 8,  y: 700, hoehe: 1000 },
    ];
    spielerx = 500;
    zufalzahl = Math.floor(Math.random() * 1001);
    körner = [];
    muscheln = [];
    steine = [];
    streke = 0;
    score = 0;
    speedBonus = 0; // wird mit der zeit größer -> alles fällt schneller
    läuft = true;

    muscheln.push({x: zufalzahl, y: 0});
    zufalzahl = Math.floor(Math.random() * 1001);
    muscheln.push({x: zufalzahl, y: 0});
    zufalzahl = Math.floor(Math.random() * 1001);
    muscheln.push({x: zufalzahl, y: 0});
    zufalzahl = Math.floor(Math.random() * 1001);

    update();
}

// neustart mit leertaste oder klick/tipp nach game over
document.addEventListener('keydown', e => { if (!läuft && e.code === 'Space') neustart(); });
canvas.addEventListener('pointerdown', () => { if (!läuft) neustart(); });

function welleUpdate(w) {
    w.counter += 1;
    if (w.counter >= w.countermax) w.counter = 0;

    if (w.counter == 0) {
        if (w.ziel >= w.x) {
            w.x += w.reinspeed;
            w.counter = -1;
        }
        if (w.ziel <= w.x) {
            w.counter = 1000;
            w.ziel = Math.floor(Math.random() * 601) + 200;
            // zufällige neue geschwindigkeit bei jeder welle
            w.reinspeed = Math.floor(Math.random() * 5) + 1;
            w.rausspeed = w.reinspeed + Math.floor(Math.random() * 4) + 2;
        }
    }
    if (w.counter >= 1000) {
        w.x -= w.rausspeed;
        if (w.x <= 0) {
            w.x = 0;
            w.counter = 0;
        }
    }
}

// prüft ob ein punkt gerade von einer welle bedeckt ist
function inWelle(x, y) {
    for (let w of wellen) {
        if (x <= w.x && y >= w.y && y <= w.y + w.hoehe) return true;
    }
    return false;
}

function update() {
    if (!läuft) return;

    zufall_1_50 = Math.floor(Math.random() * 51);
    ctx.clearRect(0, 0, 1000, 750);

    if (keys['KeyA'] || keys['ArrowLeft']  || touchRichtung === -1) spielerx -= 4;
    if (keys['KeyD'] || keys['ArrowRight'] || touchRichtung === 1)  spielerx += 4;
    if (spielerx >= 1000) spielerx = 1000;
    if (spielerx <= 0) spielerx = 0;

    zufall = Math.floor(Math.random() * 301);

    // je weiter man kommt, desto schneller fällt alles (max +3)
    speedBonus = Math.min(3, streke / 2000);
    const fallspeed = 3 + speedBonus;

    körner = körner.filter(k => k.y < 800);
    körner.push({x: zufalzahl, y: 0});
    for (let k of körner) k.y += fallspeed;
    zufalzahl = Math.floor(Math.random() * 1001);

    if (zufall <= 2) muscheln.push({x: zufalzahl, y: 0}); // etwas öfter, weil wellen muscheln wegspülen
    if (zufall == 20) steine.push({x: zufalzahl, y: 0, r: zufall_1_50});

    for (let m of muscheln) m.y += fallspeed;
    for (let s of steine) s.y += fallspeed;

    // muscheln und steine die unten raus sind entfernen
    muscheln = muscheln.filter(m => m.y < 800);
    steine = steine.filter(s => s.y < 800 + s.r);

    // jede welle unabhängig updaten
    for (let w of wellen) welleUpdate(w);

    // wellen spülen muscheln weg
    muscheln = muscheln.filter(m => !inWelle(m.x, m.y));

    // kollision muscheln
    for (let m of muscheln) {
        let dx = m.x - spielerx;
        let dy = m.y - 750;
        let abstand = Math.sqrt(dx*dx + dy*dy);
        if (abstand < 60) {
            muscheln = muscheln.filter(x => x !== m);
            score += 1;
        }
    }

    // kollision steine
    let getroffen = false;
    for (let s of steine) {
        let dx = s.x - spielerx;
        let dy = s.y - 750;
        let abstand = Math.sqrt(dx*dx + dy*dy);
        if (abstand < s.r + 30) getroffen = true;
    }

    // zeichnen körner
    for (let k of körner) {
        ctx.fillStyle = '#98893A';
        ctx.fillRect(k.x, k.y, 10, 10);
    }

    // zeichnen muscheln
    for (let m of muscheln) muschelzeichnen(m.x, m.y);

    // zeichnen steine
    for (let s of steine) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = 'grey';
        ctx.fill();
    }

    // zeichnen spieler
    ctx.beginPath();
    ctx.arc(spielerx, 750, 30, 0, Math.PI * 2);
    ctx.fillStyle = '#2FA272';
    ctx.fill();

    streke += 1;

    // zeichnen wellen
    for (let w of wellen) {
        ctx.fillStyle = 'rgba(0, 80, 255, 0.6)';
        ctx.fillRect(0, w.y, w.x, w.hoehe);
    }

    document.querySelector('#laufanzeige b').textContent = streke;
    document.querySelector('#anzeige b').textContent = score;

    // erst alles zeichnen, dann game over anzeigen (sonst wird es übermalt)
    if (getroffen) { stop(); return; }

    requestAnimationFrame(update);
}

function muschelzeichnen(x, y) {
    ctx.beginPath();
    ctx.arc(x, y, 30, Math.PI, 0, false);
    ctx.fillStyle = '#F5CBA7';
    ctx.fill();
    ctx.strokeStyle = '#C39A6B';
    ctx.stroke();

    ctx.strokeStyle = '#C39A6B';
    ctx.lineWidth = 1;
    for (let i = 0; i <= 6; i++) {
        let winkel = Math.PI + (i * Math.PI / 6);
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x + Math.cos(winkel) * 30, y + Math.sin(winkel) * 30);
        ctx.stroke();
    }
}

function stop() {
    läuft = false;

    // rekord speichern
    if (score > rekord) {
        rekord = score;
        localStorage.setItem('strand-rekord', rekord);
        document.querySelector('#rekord b').textContent = rekord;
    }

    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, 1000, 750);
    ctx.fillStyle = 'white';
    ctx.font = '60px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', 500, 340);
    ctx.font = '30px sans-serif';
    ctx.fillText('Muscheln: ' + score + '   |   Strecke: ' + streke, 500, 400);
    ctx.fillText('Rekord: ' + rekord, 500, 445);
    ctx.font = '24px sans-serif';
    ctx.fillText('Leertaste oder Tippen für ein neues Spiel', 500, 510);
    ctx.textAlign = 'start';
}

neustart();
  </script>
</html>
